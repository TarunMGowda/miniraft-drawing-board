<!DOCTYPE html>
<html>
<head>
    <title>Mini-RAFT Whiteboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Inter', sans-serif; }
        canvas { background: white; display: block; margin: 20px auto; border: 2px solid #555; }

        /* ===== Undo/Redo Toolbar ===== */
        #toolbar {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }

        .toolbar-btn {
            background: rgba(30, 30, 40, 0.92);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 10px 12px;
            color: #e0e0e0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-1px);
        }

        .toolbar-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .toolbar-btn svg {
            width: 16px;
            height: 16px;
        }

        /* ===== Dashboard Panel ===== */
        #dashboard {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 310px;
            background: rgba(30, 30, 40, 0.92);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 20px;
            color: #e0e0e0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0,0,0,0.45);
        }

        #dashboard h2 {
            margin: 0 0 14px 0;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #a8b4ff;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #dashboard h2::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 8px #4ade80;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px #4ade80; }
            50% { opacity: 0.5; box-shadow: 0 0 16px #4ade80; }
        }

        .dash-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .dash-row:last-child { border-bottom: none; }

        .dash-label {
            font-size: 12px;
            color: #888;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .dash-value {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }

        .dash-value.leader { color: #facc15; }
        .dash-value.term   { color: #60a5fa; }

        #replica-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 14px;
        }

        .replica-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px;
            padding: 12px;
            transition: all 0.3s ease;
        }

        .replica-card:hover {
            background: rgba(255,255,255,0.07);
            border-color: rgba(255,255,255,0.14);
            transform: translateY(-1px);
        }

        .replica-card.is-leader {
            border-color: rgba(250,204,21,0.35);
            background: rgba(250,204,21,0.06);
        }

        .replica-card.is-dead {
            border-color: rgba(239,68,68,0.3);
            background: rgba(239,68,68,0.06);
            opacity: 0.7;
        }

        .replica-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .replica-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #4ade80;
            flex-shrink: 0;
        }

        .replica-dot.dead { background: #ef4444; }

        .replica-name {
            font-size: 12px;
            font-weight: 600;
            color: #ccc;
        }

        .replica-state {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 4px;
        }

        .replica-state.leader   { background: rgba(250,204,21,0.18); color: #facc15; }
        .replica-state.follower { background: rgba(96,165,250,0.15); color: #60a5fa; }
        .replica-state.candidate { background: rgba(251,146,60,0.18); color: #fb923c; }
        .replica-state.dead     { background: rgba(239,68,68,0.15); color: #ef4444; }

        .replica-log {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }
        .replica-log span { color: #a78bfa; font-weight: 600; }

        #dash-status-bar {
            margin-top: 12px;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 500;
            text-align: center;
            letter-spacing: 0.2px;
        }

        #dash-status-bar.healthy {
            background: rgba(74,222,128,0.1);
            color: #4ade80;
            border: 1px solid rgba(74,222,128,0.2);
        }

        #dash-status-bar.degraded {
            background: rgba(251,146,60,0.1);
            color: #fb923c;
            border: 1px solid rgba(251,146,60,0.2);
        }

        #dash-status-bar.down {
            background: rgba(239,68,68,0.1);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.2);
        }
    </style>
</head>
<body>
    <!-- ===== Undo/Redo Toolbar ===== -->
    <div id="toolbar">
        <button id="undo-btn" class="toolbar-btn" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 7v6h6"></path>
                <path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"></path>
            </svg>
            Undo
        </button>
        <button id="redo-btn" class="toolbar-btn" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 7v6h-6"></path>
                <path d="M3 17a9 9 0 019-9 9 9 0 006 2.3L21 13"></path>
            </svg>
            Redo
        </button>
    </div>

    <!-- ===== Dashboard Panel ===== -->
    <div id="dashboard">
        <h2>RAFT Cluster</h2>
        <div class="dash-row">
            <span class="dash-label">Leader</span>
            <span class="dash-value leader" id="dash-leader">—</span>
        </div>
        <div class="dash-row">
            <span class="dash-label">Term</span>
            <span class="dash-value term" id="dash-term">—</span>
        </div>
        <div id="replica-grid"></div>
        <div id="dash-status-bar" class="healthy">Connecting...</div>
    </div>

    <!-- ===== Canvas (unchanged) ===== -->
    <canvas id="board" width="800" height="600"></canvas>

    <script>
        // ============================================================
        //  EXISTING DRAWING FUNCTIONALITY (unchanged)
        // ============================================================
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const ws = new WebSocket('ws://localhost:8080/ws');

        let drawing = false;

        // Draw a line
        function drawLine(x0, y0, x1, y1) {
            ctx.beginPath();
            ctx.moveTo(x0, y0);
            ctx.lineTo(x1, y1);
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.closePath();
        }

// Handle incoming messages from the Gateway
        ws.onmessage = (event) => {
            const payload = JSON.parse(event.data);

            if (payload.type === 'sync') {
                // Initial sync: load all commands and replay to current state
                strokeHistory = [];
                undoneStrokes = [];

                payload.data.forEach(command => {
                    if (command.type === 'stroke') {
                        strokeHistory.push(command);
                    } else if (command.type === 'undo') {
                        const stroke = strokeHistory.find(s => s.id === command.targetStrokeId);
                        if (stroke) {
                            strokeHistory = strokeHistory.filter(s => s.id !== stroke.id);
                            undoneStrokes.push(stroke);
                        }
                    } else if (command.type === 'redo') {
                        const stroke = undoneStrokes.find(s => s.id === command.targetStrokeId);
                        if (stroke) {
                            undoneStrokes = undoneStrokes.filter(s => s.id !== stroke.id);
                            strokeHistory.push(stroke);
                        }
                    }
                });

                redrawCanvas();
                updateButtonStates();
            } else {
                // Real-time command from another client
                handleCommand(payload);
            }
        };

        let currentX = 0, currentY = 0; // Track current drawing position

        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            currentX = e.clientX - rect.left;
            currentY = e.clientY - rect.top;
            startBrushStroke(currentX, currentY);
        });

        canvas.addEventListener('mousemove', e => {
            if (isDrawing) {
                const rect = canvas.getBoundingClientRect();
                const newX = e.clientX - rect.left;
                const newY = e.clientY - rect.top;

                // Draw the line segment immediately
                drawLine(currentX, currentY, newX, newY);

                // Add segment to current brush stroke
                addBrushSegment(currentX, currentY, newX, newY);

                currentX = newX;
                currentY = newY;
            }
        });

        canvas.addEventListener('mouseup', () => {
            if (isDrawing) {
                finishBrushStroke();
            }
        });

        // Handle mouse leaving canvas (finish stroke)
        canvas.addEventListener('mouseleave', () => {
            if (isDrawing) {
                finishBrushStroke();
            }
        });

        // ============================================================
        //  UNDO/REDO FUNCTIONALITY (Stroke Batching)
        // ============================================================
        let strokeHistory = []; // All completed brush strokes
        let undoneStrokes = []; // Strokes that have been undone
        let currentBrushStroke = null; // Current stroke being drawn
        let isDrawing = false;

        // Get references to undo/redo buttons
        const undoBtn = document.getElementById('undo-btn');
        const redoBtn = document.getElementById('redo-btn');

        // Update button states
        function updateButtonStates() {
            undoBtn.disabled = strokeHistory.length === 0;
            redoBtn.disabled = undoneStrokes.length === 0;
        }

        // Generate unique stroke ID
        function generateStrokeId() {
            return `stroke_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
        }

        // Start a new brush stroke
        function startBrushStroke(x, y) {
            currentBrushStroke = {
                id: generateStrokeId(),
                type: 'stroke',
                segments: [], // Array of {x0, y0, x1, y1}
                timestamp: Date.now()
            };
            isDrawing = true;
        }

        // Add segment to current brush stroke
        function addBrushSegment(x0, y0, x1, y1) {
            if (currentBrushStroke && isDrawing) {
                currentBrushStroke.segments.push({x0, y0, x1, y1});
            }
        }

        // Finish current brush stroke and send to server
        function finishBrushStroke() {
            if (currentBrushStroke && currentBrushStroke.segments.length > 0) {
                // Add to local history
                strokeHistory.push(currentBrushStroke);
                undoneStrokes = []; // Clear redo stack when new stroke is drawn
                updateButtonStates();

                // Send complete brush stroke to server
                ws.send(JSON.stringify(currentBrushStroke));
            }
            currentBrushStroke = null;
            isDrawing = false;
        }

        // Send undo command
        function sendUndo() {
            if (strokeHistory.length === 0) return;

            const lastStroke = strokeHistory[strokeHistory.length - 1];
            const undoCommand = {
                id: generateStrokeId(),
                type: 'undo',
                targetStrokeId: lastStroke.id,
                timestamp: Date.now()
            };

            ws.send(JSON.stringify(undoCommand));
            performUndoLocally(lastStroke);
        }

        // Send redo command
        function sendRedo() {
            if (undoneStrokes.length === 0) return;

            const strokeToRedo = undoneStrokes[undoneStrokes.length - 1];
            const redoCommand = {
                id: generateStrokeId(),
                type: 'redo',
                targetStrokeId: strokeToRedo.id,
                timestamp: Date.now()
            };

            ws.send(JSON.stringify(redoCommand));
            performRedoLocally(strokeToRedo);
        }

        // Perform undo locally (remove entire stroke from canvas)
        function performUndoLocally(stroke) {
            strokeHistory = strokeHistory.filter(s => s.id !== stroke.id);
            undoneStrokes.push(stroke);
            redrawCanvas();
            updateButtonStates();
        }

        // Perform redo locally (add entire stroke back to canvas)
        function performRedoLocally(stroke) {
            undoneStrokes = undoneStrokes.filter(s => s.id !== stroke.id);
            strokeHistory.push(stroke);
            redrawCanvas();
            updateButtonStates();
        }

        // Redraw entire canvas from history
        function redrawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            strokeHistory.forEach(stroke => {
                if (stroke.type === 'stroke' && stroke.segments) {
                    stroke.segments.forEach(segment => {
                        drawLine(segment.x0, segment.y0, segment.x1, segment.y1);
                    });
                }
            });
        }

        // Handle commands from other clients
        function handleCommand(command) {
            if (command.type === 'stroke') {
                // Add new stroke from another client
                if (!strokeHistory.find(s => s.id === command.id)) {
                    strokeHistory.push(command);
                    redrawCanvas();
                    updateButtonStates();
                }
            } else if (command.type === 'undo') {
                // Handle undo from another client
                const stroke = strokeHistory.find(s => s.id === command.targetStrokeId);
                if (stroke) {
                    performUndoLocally(stroke);
                }
            } else if (command.type === 'redo') {
                // Handle redo from another client
                const stroke = undoneStrokes.find(s => s.id === command.targetStrokeId);
                if (stroke) {
                    performRedoLocally(stroke);
                }
            }
        }

        // Button event listeners
        undoBtn.addEventListener('click', sendUndo);
        redoBtn.addEventListener('click', sendRedo);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'z' && !e.shiftKey) {
                    e.preventDefault();
                    sendUndo();
                } else if ((e.key === 'y') || (e.key === 'z' && e.shiftKey)) {
                    e.preventDefault();
                    sendRedo();
                }
            }
        });

        // ============================================================
        //  DASHBOARD: Poll /cluster-info every 2 seconds
        // ============================================================
        const dashLeader   = document.getElementById('dash-leader');
        const dashTerm     = document.getElementById('dash-term');
        const replicaGrid  = document.getElementById('replica-grid');
        const statusBar    = document.getElementById('dash-status-bar');

        async function refreshDashboard() {
            try {
                const res = await fetch('http://localhost:8080/cluster-info');
                const info = await res.json();

                // Leader name
                if (info.leader) {
                    dashLeader.textContent = `Replica ${info.leader.id}`;
                    dashTerm.textContent   = info.leader.term;
                } else {
                    dashLeader.textContent = 'None';
                    dashTerm.textContent   = '—';
                }

                // Replica cards
                const aliveCount = info.replicas.filter(r => r.alive).length;
                replicaGrid.innerHTML = '';

                info.replicas.forEach(r => {
                    const card = document.createElement('div');
                    card.className = 'replica-card';
                    if (!r.alive) card.classList.add('is-dead');
                    if (r.state === 'LEADER') card.classList.add('is-leader');

                    const stateClass = r.alive ? (r.state || 'follower').toLowerCase() : 'dead';
                    const stateText  = r.alive ? (r.state || 'UNKNOWN') : 'OFFLINE';
                    const replicaId  = r.id || r.url.split('replica')[1]?.charAt(0) || '?';

                    card.innerHTML = `
                        <div class="replica-header">
                            <div class="replica-dot ${r.alive ? '' : 'dead'}"></div>
                            <span class="replica-name">Replica ${replicaId}</span>
                        </div>
                        <span class="replica-state ${stateClass}">${stateText}</span>
                        <div class="replica-log">Log: <span>${r.alive ? r.log_size : '—'}</span></div>
                    `;
                    replicaGrid.appendChild(card);
                });

                // Status bar
                if (aliveCount === info.replicas.length && info.leader) {
                    statusBar.className = 'healthy';
                    statusBar.textContent = `✓ Cluster Healthy · ${aliveCount}/${info.replicas.length} nodes`;
                } else if (aliveCount >= 3) {
                    statusBar.className = 'degraded';
                    statusBar.textContent = `⚠ Degraded · ${aliveCount}/${info.replicas.length} nodes online`;
                } else {
                    statusBar.className = 'down';
                    statusBar.textContent = `✕ Quorum Lost · ${aliveCount}/${info.replicas.length} nodes online`;
                }
            } catch (err) {
                statusBar.className = 'down';
                statusBar.textContent = '✕ Gateway unreachable';
            }
        }

        // Poll every 2 seconds
        setInterval(refreshDashboard, 2000);
        // Initial fetch
        refreshDashboard();
    </script>
</body>
</html>
